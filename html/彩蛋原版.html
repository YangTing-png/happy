<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>星空 - 生日快乐</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      background-image: url('星空.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .bottom-text {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      font-family: sans-serif;
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
      z-index: 1000;
      pointer-events: none;
    }

    .continue-button {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 40px;
      font-size: 16px;
      font-family: "Microsoft YaHei", sans-serif;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      cursor: pointer;
      z-index: 2000;
      transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }

    .continue-button.show {
      bottom: 80px;
      opacity: 1;
    }

    .continue-button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 25px rgba(100, 200, 255, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.2);
      transform: translateX(-50%) translateY(-3px) scale(1.05);
      color: #fff;
    }

  </style>
</head>

<body>
  <div id="bg-layer"></div>
  <canvas id="c1" style="display:none;"></canvas>
  <canvas id="c2"></canvas>
  <canvas id="c3"></canvas>
  
  <div class="bottom-text">家人们，不要着急，再耐心等待一会儿</div>
  <button class="continue-button" id="continueBtn">继续旅程 ✨</button>

  <script>
    const CONFIG = {
      particleCount: 100,   // 粒子更多
      fidelity: 10,         // 文字点更稀疏 → 成型更快
      fontSize: 220,
      text: '慧雅子，生日快乐',
      fontFamily: '"HanYiShangWei", "YuWei", "KaiTi", "Comic Sans MS", cursive, sans-serif'
    };

    const c1 = document.getElementById('c1');
    const c2 = document.getElementById('c2');
    const c3 = document.getElementById('c3');
    const ctx1 = c1.getContext('2d');
    const ctx2 = c2.getContext('2d');
    const ctx3 = c3.getContext('2d');

    let w = window.innerWidth;
    let h = window.innerHeight;
    c2.width = c3.width = w;
    c2.height = c3.height = h;

    // 文字像素初始化
    ctx1.fillStyle = '#000';
    let textWidth = 99999999;
    let currentFontSize = CONFIG.fontSize;
    while (textWidth > w * 0.85) {
      ctx1.font = `900 ${currentFontSize--}px ${CONFIG.fontFamily}`;
      textWidth = ctx1.measureText(CONFIG.text).width;
    }
    c1.width = textWidth;
    c1.height = currentFontSize * 1.5;
    ctx1.font = `900 ${currentFontSize}px ${CONFIG.fontFamily}`;
    ctx1.fillText(CONFIG.text, 0, currentFontSize);
    
    const imgData = ctx1.getImageData(0, 0, c1.width, c1.height);
    const targets = [];
    for (let i = 0; i < imgData.data.length; i += 4) {
      if (imgData.data[i + 3] > 128) {
        const x = (i / 4) % c1.width;
        const y = Math.floor((i / 4) / c1.width);
        if (x % CONFIG.fidelity === 0 && y % CONFIG.fidelity === 0) {
          targets.push({ x, y });
        }
      }
    }

    ctx3.shadowColor = '#FFF';
    ctx3.shadowBlur = 10;

    function getTarget() {
      if (targets.length > 0) {
        const idx = Math.floor(Math.random() * targets.length);
        let { x, y } = targets[idx];
        targets.splice(idx, 1);
        x += (w - textWidth) / 2;
        y += (h - currentFontSize) / 2;
        return { x, y };
      }
    }

    // 流星
    class Meteor {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * w + 300; 
        this.y = Math.random() * -100;
        this.len = Math.random() * 150 + 100;
        this.size = Math.random() * 0.5 + 0.5;
        this.speed = Math.random() * 2 + 5; // 流星更快
        this.angle = Math.PI / 4 + (Math.random() * 0.2);
        this.hue = Math.random() * 50 + 200;
        this.active = true;
      }
      update() {
        this.x -= this.speed * Math.cos(this.angle);
        this.y += this.speed * Math.sin(this.angle);
        if (this.x < -300 || this.y > h + 300) {
          this.reset();
        }
      }
      draw() {
        ctx2.save();
        ctx2.translate(this.x, this.y);
        ctx2.rotate(Math.PI - this.angle);
        ctx2.fillStyle = '#fff';
        ctx2.shadowBlur = 5;
        ctx2.shadowColor = '#fff';
        ctx2.beginPath();
        ctx2.arc(0, 0, this.size * 2, 0, Math.PI * 2);
        ctx2.fill();

        const gradient = ctx2.createLinearGradient(0, 0, -this.len, 0);
        gradient.addColorStop(0, "rgba(255,255,255,1)");
        gradient.addColorStop(0.1, `hsla(${this.hue},100%,80%,0.8)`);
        gradient.addColorStop(1, "transparent");
        ctx2.fillStyle = gradient;
        ctx2.shadowBlur = 0;
        ctx2.beginPath();
        ctx2.moveTo(0, -this.size * 0.5);
        ctx2.lineTo(-this.len, 0);
        ctx2.lineTo(0, this.size * 0.5);
        ctx2.fill();
        ctx2.restore();
      }
    }

    // 烟花粒子
    class Shard {
      constructor(x, y, hue) {
        this.x = x; this.y = y; 
        this.hue = Math.floor(Math.random() * 140) + 180;
        this.target = getTarget();
        this.angle = Math.random() * Math.PI * 2;
        this.speed = Math.random() * 8 + 6;  // 粒子更快
        this.friction = 0.96;
        this.gravity = 0.05;
        this.size = 1.5;
        this.timer = 0;
        this.ttl = 30 + Math.random() * 10;  // 存活时间更短
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
      }
      update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        if (this.target) {
          const dx = this.target.x - this.x;
          const dy = this.target.y - this.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < 200) {
            this.vx += dx * 0.03;  // 吸力更强
            this.vy += dy * 0.03;
          }
        }
        this.x += this.vx;
        this.y += this.vy;
        this.timer++;
      }
      draw() {
        const lightness = 50 + Math.random() * 25;
        ctx2.save(); 
        ctx2.globalCompositeOperation = 'lighter';
        ctx2.fillStyle = `hsl(${this.hue}, 100%, ${lightness}%)`;
        ctx2.shadowBlur = 3;
        ctx2.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
        ctx2.beginPath();
        ctx2.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx2.fill();
        ctx2.restore();
      }
    }

    // 火箭（烟花发射）
    class Rocket {
      constructor() {
        this.x = Math.random() * w; 
        this.y = h;
        this.hue = Math.random() * 360;
        this.targetY = h * 0.15 + Math.random() * h * 0.25;
        this.vy = -(25 + Math.random() * 10);  // 火箭飞得更快
        this.vx = (Math.random() - 0.5) * 4;
        this.exploded = false;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.25;  // 重力更强
        if (this.vy >= 0 || this.y < this.targetY) {
          this.explode();
          return false; 
        }
        return true; 
      }
      draw() {
        ctx2.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
        ctx2.fillRect(this.x, this.y, 3, 10);
      }
      explode() {
        const count = CONFIG.particleCount;
        for(let i=0; i<count; i++) {
          shards.push(new Shard(this.x, this.y, this.hue));
        }
      }
    }

    // 流星数量
    const meteors = Array.from({length: 6}, () => new Meteor());
    let rockets = [];
    let shards = [];
    let tick = 0;

    function loop() {
      ctx2.globalCompositeOperation = 'destination-out';
      ctx2.fillStyle = 'rgba(0, 0, 0, 0.4)';  // 拖尾消失更快
      ctx2.fillRect(0, 0, w, h);
      ctx2.globalCompositeOperation = 'source-over';

      tick++;

      // 烟花发射更密集
      if (tick % 4 === 0 && targets.length > 0) {
        rockets.push(new Rocket());
      }
      
      meteors.forEach(m => { m.update(); m.draw(); });

      rockets = rockets.filter(r => {
        r.draw();
        return r.update();
      });

      for (let i = shards.length - 1; i >= 0; i--) {
        const s = shards[i];
        s.update();
        s.draw();

        if (s.timer > s.ttl) {
          if(s.target) {
            ctx3.save();
            ctx3.globalCompositeOperation = 'lighter';
            ctx3.shadowBlur = 8;
            ctx3.shadowColor = `hsl(${s.hue},100%,60%)`;
            ctx3.fillStyle = `hsl(${s.hue},100%,70%)`;
            ctx3.beginPath();
            ctx3.arc(s.target.x + CONFIG.fidelity/2, s.target.y + CONFIG.fidelity/2, CONFIG.fidelity/1.5, 0, Math.PI*2);
            ctx3.fill();
            ctx3.restore();
          }
          shards.splice(i, 1);
        }
      }

      requestAnimationFrame(loop);
    }

    loop();

    window.addEventListener('resize', () => {
        w = window.innerWidth;
        h = window.innerHeight;
        c2.width = c3.width = w;
        c2.height = c3.height = h;
    });

    // 按钮显示
    function checkTargetsEmpty() {
      if (targets.length === 0) {
        const btn = document.getElementById('continueBtn');
        if (btn) {
          setTimeout(() => {
            btn.classList.add('show');
          }, 800);
        }
      } else {
        setTimeout(checkTargetsEmpty, 100);
      }
    }
    
    setTimeout(checkTargetsEmpty, 1500);

    document.getElementById('continueBtn').addEventListener('click', () => {
      document.body.style.transition = 'opacity 1s';
      document.body.style.opacity = '0';
      setTimeout(() => {
        window.location.href = '结尾.html'; 
      }, 1000);
    });

  </script>
  <audio src="../music/一程山路.mp3" autoplay loop></audio>
</body>
</html>
